name: Compila Cosmo-Edu-Lab (Win, Mac, Linux)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build su ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: 1. Scarica il codice dal repository
      uses: actions/checkout@v4

    - name: 2. Installa Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' 

    - name: 3. Installa PyInstaller e le dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: 4. Lancia lo script di PyInstaller
      run: python App/build_script.py

    - name: 5. Crea l'archivio ZIP multipiattaforma 
      shell: bash
      run: |
        cd dist
        if [ "${{ runner.os }}" == "Windows" ]; then
          
          python -c "import shutil; shutil.make_archive('../CosmoEduLab-${{ matrix.os }}', 'zip', '.')"
        else
         
          zip -ry ../CosmoEduLab-${{ matrix.os }}.zip .
        fi

    - name: 6. Salva l'archivio ZIP creato
      uses: actions/upload-artifact@v4
      with:
        name: artifact-${{ matrix.os }}
        path: CosmoEduLab-${{ matrix.os }}.zip

  
  release:
    name: Pubblica la Release
    needs: build 
    runs-on: ubuntu-latest
    steps:
      - name: 1. Scarica il codice (necessario per aggiornare il tag git)
        uses: actions/checkout@v4

      - name: 2. Raccogli tutti gli ZIP generati
        uses: actions/download-artifact@v4
        with:
          path: release_zips/
          merge-multiple: true 

      - name: 3. Aggiorna la Release in automatico
        uses: ncipollo/release-action@v1
        with:
          tag: "v1.0"                        
          name: "Cosmo-Edu Lab v1.0"
          body: "Aggiornamento automatico degli eseguibili."
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          commit: ${{ github.sha }}
          artifacts: "release_zips/*.zip"